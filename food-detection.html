<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Detection | Amudra</title>

    <style>
        /* ========== General Styles ========== */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }

        /* ========== Sidebar ========== */
        .sidebar {
            position: fixed;
            width: 250px;
            height: 100%;
            background: green;
            padding: 20px;
            color: white;
        }

        .sidebar .logo {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar .menu {
            list-style: none;
            padding: 0;
        }

        .sidebar .menu li {
            margin: 20px 0;
        }

        .sidebar .menu li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        .sidebar .menu li a:hover {
            text-decoration: underline;
        }

        /* ========== Food Detection Page ========== */
        .food-detection {
            margin-left: 270px;
            padding: 40px;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .detection-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .detection-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        .upload-box, .result-box {
            flex: 1;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
        }

        .upload-box {
            border-right: 2px dashed #ccc;
        }

        .upload-box input {
            display: none;
        }

        .upload-label {
            display: block;
            width: 100%;
            padding: 15px;
            background: green;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .upload-label:hover {
            transform: scale(1.05);
            background: green;
        }

        .upload-box img {
            display: none;
            width: 100%;
            max-width: 200px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .result-box h2 {
            font-size: 20px;
            color: #333;
        }

        #resultText {
            font-size: 18px;
            margin: 10px 0;
            color: #666;
        }

        .detect-btn {
            padding: 12px 20px;
            background: #28a745;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .detect-btn:hover {
            transform: scale(1.05);
            background: #218838;
        }

        /* ========== Loader Animation ========== */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid green;
            border-top: 5px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== Responsive Design ========== */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                text-align: center;
            }

            .food-detection {
                margin-left: 0;
                padding: 20px;
            }

            .detection-container {
                flex-direction: column;
            }

            .upload-box {
                border-right: none;
                border-bottom: 2px dashed #ccc;
                margin-bottom: 20px;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            setTimeout(() => document.getElementById("loader").style.display = "none", 1000);
        });
    </script>

</head>
<body>

    <!-- ========== LOADER ========== -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
        <div class="logo">
            <h2>Amudra</h2>
        </div>
        <ul class="menu">
            <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="donate-food.html"><i class="fas fa-hand-holding-heart"></i> Donate Food</a></li>
            <li class="active"><a href="food-detection.html"><i class="fas fa-seedling"></i> Food Detection</a></li>
            <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a></li>
            <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="food-detection">
        <header class="detection-header">
            <h1>Food Spoilage Detection</h1>
            <p>Upload a food image to check its freshness.</p>
        </header>

        <div class="detection-container">
            <!-- Left Box (Upload Image) -->
            <div class="upload-box">
                <input type="file" id="foodImageInput" accept="image/*">
                <label for="foodImageInput" class="upload-label">
                    <i class="fas fa-upload"></i> Click to Upload
                </label>
                <img id="previewImage" src="" alt="Preview Image">
            </div>

            <!-- Right Box (Detection Result) -->
            <div class="result-box">
                <h2>Detection Result</h2>
                <p id="resultText">No Image Uploaded</p>
                <button id="detectFood" class="detect-btn">Analyze</button>
            </div>
        </div>

    </main>

</body>
</html>
